<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#13203a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="codePanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1829"/>
      <stop offset="100%" stop-color="#0a1420"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="600" fill="url(#bg)"/>

  <!-- Background grid -->
  <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(148,163,184,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="960" height="600" fill="url(#grid)"/>

  <!-- Code editor mockup (left) -->
  <g transform="translate(55, 68)">
    <!-- Editor window frame -->
    <rect width="490" height="430" rx="12" fill="url(#codePanel)" stroke="rgba(148,163,184,0.12)" stroke-width="1"/>

    <!-- Editor title bar -->
    <rect width="490" height="34" rx="12" fill="rgba(30,41,59,0.8)"/>
    <rect width="490" height="22" y="12" fill="rgba(30,41,59,0.8)"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="17" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="36" cy="17" r="5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="52" cy="17" r="5" fill="#22c55e" opacity="0.7"/>
    <!-- Filename -->
    <text x="245" y="21" font-family="system-ui, monospace" font-size="11" fill="#64748b" text-anchor="middle">termaui.css</text>

    <!-- Code content -->
    <g transform="translate(20, 54)" font-family="'Courier New', monospace" font-size="12.5">

      <!-- Line numbers -->
      <text x="0" y="0" fill="#334155" font-size="11">1</text>
      <text x="0" y="20" fill="#334155" font-size="11">2</text>
      <text x="0" y="40" fill="#334155" font-size="11">3</text>
      <text x="0" y="60" fill="#334155" font-size="11">4</text>
      <text x="0" y="80" fill="#334155" font-size="11">5</text>
      <text x="0" y="100" fill="#334155" font-size="11">6</text>
      <text x="0" y="120" fill="#334155" font-size="11">7</text>
      <text x="0" y="140" fill="#334155" font-size="11">8</text>
      <text x="0" y="160" fill="#334155" font-size="11">9</text>
      <text x="0" y="180" fill="#334155" font-size="11">10</text>
      <text x="0" y="200" fill="#334155" font-size="11">11</text>
      <text x="0" y="220" fill="#334155" font-size="11">12</text>
      <text x="0" y="240" fill="#334155" font-size="11">13</text>
      <text x="0" y="260" fill="#334155" font-size="11">14</text>
      <text x="0" y="280" fill="#334155" font-size="11">15</text>
      <text x="0" y="300" fill="#334155" font-size="11">16</text>
      <text x="0" y="320" fill="#334155" font-size="11">17</text>
      <text x="0" y="340" fill="#334155" font-size="11">18</text>
      <text x="0" y="360" fill="#334155" font-size="11">19</text>

      <!-- Code (with syntax highlighting) -->
      <!-- @font-face block -->
      <text x="22" y="0" fill="#c084fc">@font-face</text>
      <text x="106" y="0" fill="#e2e8f0"> {</text>

      <text x="22" y="20"><tspan fill="#38bdf8">  font-family</tspan><tspan fill="#64748b">: </tspan><tspan fill="#4ade80">'Jomolhari'</tspan><tspan fill="#e2e8f0">;</tspan></text>
      <text x="22" y="40"><tspan fill="#38bdf8">  src</tspan><tspan fill="#64748b">: </tspan><tspan fill="#fb923c">url</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#4ade80">'/fonts/jomolhari.woff2'</tspan><tspan fill="#e2e8f0">)</tspan></text>
      <text x="22" y="60"><tspan fill="#64748b">       format</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#4ade80">'woff2'</tspan><tspan fill="#e2e8f0">);</tspan></text>
      <text x="22" y="80"><tspan fill="#38bdf8">  unicode-range</tspan><tspan fill="#64748b">: </tspan><tspan fill="#fbbf24">U+0F00-0FFF</tspan><tspan fill="#e2e8f0">;</tspan></text>
      <text x="22" y="100" fill="#e2e8f0">}</text>

      <!-- Blank line -->
      <text x="22" y="120" fill="#334155">  </text>

      <!-- .tr-jomolhari -->
      <text x="22" y="140"><tspan fill="#fbbf24">.tr-jomolhari</tspan><tspan fill="#e2e8f0"> {</tspan></text>
      <text x="22" y="160"><tspan fill="#38bdf8">  font-family</tspan><tspan fill="#64748b">: </tspan><tspan fill="#4ade80">'Jomolhari'</tspan><tspan fill="#e2e8f0">,</tspan></text>
      <text x="22" y="180"><tspan fill="#64748b">    </tspan><tspan fill="#4ade80">'Noto Serif Tibetan'</tspan><tspan fill="#e2e8f0">,</tspan></text>
      <text x="22" y="200"><tspan fill="#64748b">    </tspan><tspan fill="#94a3b8">serif</tspan><tspan fill="#e2e8f0">;</tspan></text>
      <text x="22" y="220" fill="#e2e8f0">}</text>

      <!-- lang=bo guardian fix -->
      <text x="22" y="260"><tspan fill="#fbbf24">[lang="bo"]</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#fbbf24">.tr-text</tspan><tspan fill="#e2e8f0"> {</tspan></text>
      <text x="22" y="280"><tspan fill="#38bdf8">  line-height</tspan><tspan fill="#64748b">: </tspan><tspan fill="#fb923c">1.8</tspan><tspan fill="#e2e8f0">;</tspan></text>
      <text x="22" y="300"><tspan fill="#38bdf8">  letter-spacing</tspan><tspan fill="#64748b">: </tspan><tspan fill="#fb923c">normal</tspan><tspan fill="#e2e8f0">;</tspan></text>
      <text x="22" y="320"><tspan fill="#38bdf8">  word-break</tspan><tspan fill="#64748b">: </tspan><tspan fill="#fb923c">keep-all</tspan><tspan fill="#e2e8f0">;</tspan></text>
      <text x="22" y="340" fill="#e2e8f0">}</text>

      <!-- .tr-pecha -->
      <text x="22" y="360"><tspan fill="#fbbf24">.tr-pecha</tspan><tspan fill="#e2e8f0"> { </tspan><tspan fill="#64748b">/* ... */</tspan><tspan fill="#e2e8f0"> }</tspan></text>
    </g>
  </g>

  <!-- Right panel -->
  <g transform="translate(608, 90)">
    <!-- Category badge -->
    <text font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#38bdf8">DEVELOPMENT</text>

    <!-- Logo area -->
    <g transform="translate(0, 30)">
      <!-- tr- prefix highlighted -->
      <text font-family="'Courier New', monospace" font-size="38" font-weight="700" fill="#fbbf24">tr-</text>
      <text x="62" font-family="'Courier New', monospace" font-size="38" font-weight="700" fill="#e2e8f0">UI</text>
    </g>

    <text y="90" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#94a3b8" letter-spacing="-0.3">A CSS Framework for</text>
    <text y="112" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#94a3b8" letter-spacing="-0.3">Tibetan Script</text>

    <!-- Divider -->
    <rect y="128" width="48" height="3" rx="1.5" fill="url(#gold)"/>

    <!-- Module list -->
    <g transform="translate(0, 154)" font-family="system-ui, sans-serif" font-size="12.5">
      <text fill="#475569" font-size="10" letter-spacing="1.5">8 CSS MODULES</text>

      <!-- Base modules -->
      <text y="22" fill="#64748b" font-size="10" letter-spacing="1">BASE</text>
      <g transform="translate(0, 34)">
        <rect width="7" height="7" rx="1" fill="#64748b" y="-1"/>
        <text x="14" y="7" fill="#94a3b8">_fonts.css — @font-face declarations</text>
      </g>
      <g transform="translate(0, 54)">
        <rect width="7" height="7" rx="1" fill="#64748b" y="-1"/>
        <text x="14" y="7" fill="#94a3b8">_reset.css — Tibetan rendering reset</text>
      </g>

      <!-- Utility modules -->
      <text y="80" fill="#64748b" font-size="10" letter-spacing="1">UTILITIES</text>
      <g transform="translate(0, 92)">
        <rect width="7" height="7" rx="1" fill="#fbbf24" y="-1"/>
        <text x="14" y="7" fill="#cbd5e1">_font-stacks.css</text>
      </g>
      <g transform="translate(0, 112)">
        <rect width="7" height="7" rx="1" fill="#38bdf8" y="-1"/>
        <text x="14" y="7" fill="#cbd5e1">_pecha.css</text>
      </g>
      <g transform="translate(0, 132)">
        <rect width="7" height="7" rx="1" fill="#22c55e" y="-1"/>
        <text x="14" y="7" fill="#cbd5e1">_guardian.css</text>
      </g>
      <g transform="translate(0, 152)">
        <rect width="7" height="7" rx="1" fill="#a855f7" y="-1"/>
        <text x="14" y="7" fill="#cbd5e1">_effects.css</text>
      </g>
      <g transform="translate(0, 172)">
        <rect width="7" height="7" rx="1" fill="#f97316" y="-1"/>
        <text x="14" y="7" fill="#cbd5e1">_stacking.css</text>
      </g>
      <g transform="translate(0, 192)">
        <rect width="7" height="7" rx="1" fill="#ec4899" y="-1"/>
        <text x="14" y="7" fill="#cbd5e1">_typography.css</text>
      </g>
    </g>

    <!-- Compatibility badges -->
    <g transform="translate(0, 390)" font-family="system-ui, sans-serif" font-size="11">
      <text fill="#475569" font-size="10" letter-spacing="1">WORKS ALONGSIDE</text>
      <g transform="translate(0, 16)">
        <rect width="72" height="22" rx="4" fill="rgba(56,189,248,0.1)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
        <text x="36" y="15.5" fill="#7dd3fc" text-anchor="middle">Tailwind</text>
      </g>
      <g transform="translate(80, 16)">
        <rect width="72" height="22" rx="4" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.25)" stroke-width="1"/>
        <text x="36" y="15.5" fill="#c084fc" text-anchor="middle">Bootstrap</text>
      </g>
      <g transform="translate(160, 16)">
        <rect width="56" height="22" rx="4" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
        <text x="28" y="15.5" fill="#86efac" text-anchor="middle">Vanilla</text>
      </g>
    </g>
  </g>

  <!-- Divider -->
  <line x1="580" y1="80" x2="580" y2="520" stroke="rgba(148,163,184,0.07)" stroke-width="1"/>

  <!-- Branding -->
  <text x="480" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="1">TERMA FOUNDRY · termafoundry.com</text>
</svg>
