<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1f35"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="600" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(148,163,184,0.06)"/>
  </pattern>
  <rect width="960" height="600" fill="url(#dots)"/>

  <!-- Left panel: font specimens -->
  <g transform="translate(60, 80)">

    <!-- Font card 1 - largest, most prominent -->
    <rect width="440" height="90" rx="8" fill="rgba(30,41,59,0.8)" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
    <text x="16" y="20" font-family="system-ui" font-size="9" fill="#64748b" letter-spacing="1.5">JOMOLHARI · UCHEN</text>
    <text x="16" y="68" font-family="serif" font-size="44" fill="#e2e8f0">ཤེས་རབ།</text>

    <!-- Font card 2 -->
    <g transform="translate(0, 104)">
      <rect width="440" height="72" rx="8" fill="rgba(30,41,59,0.6)" stroke="rgba(148,163,184,0.08)" stroke-width="1"/>
      <text x="16" y="18" font-family="system-ui" font-size="9" fill="#64748b" letter-spacing="1.5">NOTO SERIF TIBETAN · UCHEN</text>
      <text x="16" y="54" font-family="serif" font-size="34" fill="#cbd5e1">བྱང་ཆུབ་སེམས།</text>
    </g>

    <!-- Font card 3 -->
    <g transform="translate(0, 192)">
      <rect width="440" height="72" rx="8" fill="rgba(30,41,59,0.6)" stroke="rgba(148,163,184,0.08)" stroke-width="1"/>
      <text x="16" y="18" font-family="system-ui" font-size="9" fill="#64748b" letter-spacing="1.5">DDC UCHEN · CLASSICAL</text>
      <text x="16" y="54" font-family="serif" font-size="34" fill="#94a3b8">གང་གི་རྗེས།</text>
    </g>

    <!-- Font card 4 - drutsa style hint -->
    <g transform="translate(0, 280)">
      <rect width="210" height="60" rx="8" fill="rgba(251,191,36,0.06)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
      <text x="12" y="16" font-family="system-ui" font-size="9" fill="#92400e" letter-spacing="1.5">DRUTSA</text>
      <text x="12" y="46" font-family="serif" font-size="28" fill="#fbbf24">དཔེ་ཆ།</text>
    </g>

    <!-- Font card 5 - sans -->
    <g transform="translate(224, 280)">
      <rect width="216" height="60" rx="8" fill="rgba(56,189,248,0.06)" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>
      <text x="12" y="16" font-family="system-ui" font-size="9" fill="#0c4a6e" letter-spacing="1.5">SANS-SERIF</text>
      <text x="12" y="46" font-family="sans-serif" font-size="28" fill="#38bdf8">ཀ་ཁ་ག།</text>
    </g>

    <!-- Count badge -->
    <g transform="translate(0, 362)">
      <rect width="130" height="36" rx="18" fill="url(#gold)"/>
      <text x="65" y="23.5" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a0a00" text-anchor="middle">36 Typefaces</text>
    </g>
    <g transform="translate(144, 362)">
      <rect width="130" height="36" rx="18" fill="rgba(56,189,248,0.15)" stroke="rgba(56,189,248,0.4)" stroke-width="1"/>
      <text x="65" y="23.5" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#38bdf8" text-anchor="middle">Free · OFL</text>
    </g>
    <g transform="translate(288, 362)">
      <rect width="150" height="36" rx="18" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.35)" stroke-width="1"/>
      <text x="75" y="23.5" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">Unicode U+0F00</text>
    </g>
  </g>

  <!-- Right panel -->
  <g transform="translate(578, 130)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#38bdf8">TERMA FONTS</text>
    <text y="40" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#e2e8f0" letter-spacing="-0.5">Tibetan</text>
    <text y="72" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#e2e8f0" letter-spacing="-0.5">Fonts</text>
    <text y="104" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#e2e8f0" letter-spacing="-0.5">Library</text>
    <rect y="120" width="48" height="3" rx="1.5" fill="url(#gold)"/>

    <text y="158" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">Uchen, Drutsa, Sans</text>
    <text y="176" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">&amp; Semi-Cursive styles</text>
    <text y="194" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">with live preview.</text>

    <!-- Script categories -->
    <g transform="translate(0, 218)">
      <text font-family="system-ui" font-size="11" fill="#64748b" letter-spacing="1">CATEGORIES</text>
      <g transform="translate(0, 16)">
        <circle cx="6" cy="6" r="5" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="1"/>
        <text x="18" y="11" font-family="system-ui" font-size="12" fill="#cbd5e1">Uchen — 24 fonts</text>
      </g>
      <g transform="translate(0, 38)">
        <circle cx="6" cy="6" r="5" fill="rgba(56,189,248,0.3)" stroke="#38bdf8" stroke-width="1"/>
        <text x="18" y="11" font-family="system-ui" font-size="12" fill="#cbd5e1">Drutsa — 6 fonts</text>
      </g>
      <g transform="translate(0, 60)">
        <circle cx="6" cy="6" r="5" fill="rgba(34,197,94,0.3)" stroke="#22c55e" stroke-width="1"/>
        <text x="18" y="11" font-family="system-ui" font-size="12" fill="#cbd5e1">Sans-Serif — 3 fonts</text>
      </g>
      <g transform="translate(0, 82)">
        <circle cx="6" cy="6" r="5" fill="rgba(168,85,247,0.3)" stroke="#a855f7" stroke-width="1"/>
        <text x="18" y="11" font-family="system-ui" font-size="12" fill="#cbd5e1">Semi-Cursive — 3 fonts</text>
      </g>
    </g>
  </g>

  <!-- Divider line -->
  <line x1="548" y1="80" x2="548" y2="520" stroke="rgba(148,163,184,0.08)" stroke-width="1"/>

  <!-- Branding -->
  <text x="480" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="1">TERMA FOUNDRY · termafoundry.com</text>
</svg>
